name: release
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance (publish step)
# Publishing is wired but CANNOT fire until npm auth is configured (see RELEASE.md):
# there is no NPM_TOKEN secret and no npm trusted publisher set up, so the publish
# step fails to authenticate. Configure auth ONLY when you intend to publish.
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
