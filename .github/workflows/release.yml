name: release
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
# Version-PR management only. Actual npm publish (provenance + first deliberate
# release) is wired in a later phase; this workflow cannot publish.
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
